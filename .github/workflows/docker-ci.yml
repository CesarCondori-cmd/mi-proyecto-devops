name: Docker CI Automation

on:
  push:
    # Se activará cada vez que subas cambios a esta rama
    branches: [ "feature/configuracion-docker" ]

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y subir imagen a GitHub Packages
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Forzamos todo a minúsculas manualmente aquí:
          tags: ghcr.io/cesarcondori-cmd/mi-proyecto-devops:latest